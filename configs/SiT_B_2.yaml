# lightning.pytorch==2.4.0
seed_everything: true
tags:
  exp: &exp sigreg
torch_hub_dir: null
huggingface_cache_dir: null
trainer:
  default_root_dir: universal_flow_workdirs
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  # strategy: ddp_find_unused_parameters_true
  # logger:
  #     class_path: lightning.pytorch.loggers.WandbLogger
  #     init_args:
  #       project: universal_flow
  #       name: *exp
  num_sanity_val_steps: 0
  max_steps: 100092
  val_check_interval: 100092
  # 正常训练请修改为：400365
  check_val_every_n_epoch: null
  log_every_n_steps: 50000
  deterministic: null
  inference_mode: true
  use_distributed_sampler: false
  callbacks:
    - class_path: src.callbacks.model_checkpoint.CheckpointHook
      init_args:
        dirpath: null
        every_n_train_steps: 100090
        save_top_k: -1
        save_last: true
        # filename: "step{step}"
    - class_path: src.callbacks.save_images.SaveImagesHook
      init_args:
        save_dir: val
    - class_path: src.callbacks.save_grad_stats.SaveGradStatsHook
      init_args:
        save_dir: log_for_info
        log_interval : 100
    # - class_path: src.callbacks.repa_visualize.RepaEncoderVisualizeHook
    #   init_args:
    #     save_dir: repa_encoder_viz
    #     visualize_interval: 4000
    #     topk: 10
    #     q: 0.95
    #     exact_quantile: True
    #     # 与 latent 32×32、patch=2 时 T=256 一致；若为 null 则按 sqrt(T) 自动推断网格
    #     viz_grid_hw: [16, 16]
    - class_path: src.callbacks.TF32.TF32Callback
      init_args:
        enabled: true
  plugins:
    - src.plugins.bd_env.BDEnvironment
model:
  vae:
    class_path: src.models.vae.LatentVAE
    init_args:
      precompute: true
      weight_path: models
      # 正常训练请修改
  denoiser:
    class_path: src.models.denoiser.decoupled_sit.DDT
    init_args:
      in_channels: 4
      patch_size: 2
      num_groups: 12
      hidden_size: &hidden_dim 768
      num_blocks: 12
      num_encoder_blocks: 8
      num_classes: 1000
      attn_begin: 1
      attn_end: 2
  conditioner:
    class_path: src.models.conditioner.LabelConditioner
    init_args:
      null_class: 1000
  diffusion_trainer:
    class_path: src.diffusion.stateful_flow_matching.training_repa.REPATrainer
    init_args:
      lognorm_t: false
      patch_size: 2
      encoder_weight_path: dinov2_vitb14
      align_layer: [8]          # [4,5,6,7] # 对应的是3，4，5，6，应该仅有这一个是需要减1的
      dino_layer_timestep: [9,8,7,6] # 对应下标
      dino_layer_block: [11,10,9,8] # 对应下标
      encoder_anchor: 7
      decoder_anchor: 5
      proj_denoiser_dim: *hidden_dim 
      proj_hidden_dim: 2048 # 与DDT不一样，REPA是hidden state --> hidden state（我们是2048） --> 768
      proj_encoder_dim: 768
      proj_dim: 32
      # transform_num: 3
      encoder_depth: 11 # 对应下标
      log_interval: 100
      encoder_depth_structual: 7 # structual loss imposed on dino encoder depth(different from encoder_depth which is semantic)
      encoder_begin: 7 # attn_loss begin for dino encoder
      encoder_end: 10 # attn_loss end for dino encoder
      feat_loss_weight: 0.5
      attn_loss_weight: 0.5
      inv_loss_weight: 0.49      # 0.3
      sigreg_loss_weight: 0.01   # 0.02  # sigreg_loss_weight = 0.2 时，1000个迭代内出现inv_loss 先生高（0.25）在降低，现象比较明显。
      var_loss_weight: 0.5
      cov_loss_weight: 0.02
      disp_loss_weight: 0.01     # 0.01
      # 设置为0.05时，1000个迭代内 inv_loss几乎不怎么变， 看起来当sigreg loss降低为5.6左右的时候，坍塌没有被解决。
      # 完全不计入inv_loss, sigreg_loss时，训练1000个迭代得到的结果（一般来说两个分支相似度在0.7-0.8左右）是：


      structual_loss_weight: 0.5
      decoder_depth: 6 # imposed on DDT velocity decoder(from 8-11)
      scheduler: &scheduler src.diffusion.stateful_flow_matching.scheduling.LinearScheduler
  diffusion_sampler:
    class_path: src.diffusion.stateful_flow_matching.sampling.EulerSampler
    init_args:
      num_steps: 250
      # 正常训练请填 250
      guidance: 1.0 # 1.35 for CFG, 1.0 for without CFG, just apply to sampling(inference)
      timeshift: 1.0
      state_refresh_rate: 1
      guidance_interval_min: 0.3
      guidance_interval_max: 1.0
      scheduler: src.diffusion.stateful_flow_matching.scheduling.LinearScheduler
      w_scheduler: src.diffusion.stateful_flow_matching.scheduling.LinearScheduler
      guidance_fn: src.diffusion.base.guidance.simple_guidance_fn
      last_step: 0.04
      step_fn: src.diffusion.stateful_flow_matching.sampling.ode_step_fn
  ema_tracker:
    class_path: src.callbacks.simple_ema.SimpleEMA
    init_args:
      decay: 0.9999
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 1e-4
      betas:
        - 0.9
        - 0.95
      weight_decay: 0.0
data:
  train_dataset: imagenet256
  train_root: /your train path
  # 正常训练请修改路径
  train_image_size: 256
  train_batch_size: 32
  # 正常训练请修改
  # whole batch:256
  # 2卡 128
  # 4卡 64
  # 6卡 42
  # 8卡 32
  eval_max_num_instances: 50000
  pred_batch_size: 32
  pred_num_workers: 4
  pred_seeds: null
  pred_selected_classes: null
  num_classes: 1000
  latent_shape:
  - 4
  - 32
  - 32