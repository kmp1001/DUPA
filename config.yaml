# lightning.pytorch==2.5.0.post0
seed_everything: 0
torch_hub_dir: null
huggingface_cache_dir: null
resume: false
trainer:
  accelerator: auto
  strategy: auto
  devices: auto
  num_nodes: 1
  precision: 16-mixed
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      name: sigreg
      save_dir: .
      version: null
      offline: false
      dir: null
      id: null
      anonymous: null
      project: universal_flow
      log_model: false
      experiment: null
      prefix: ''
      checkpoint_name: null
      entity: null
      notes: null
      tags: null
      config: null
      config_exclude_keys: null
      config_include_keys: null
      allow_val_change: null
      group: null
      job_type: null
      mode: null
      force: null
      reinit: null
      resume: null
      resume_from: null
      fork_from: null
      save_code: null
      tensorboard: null
      sync_tensorboard: null
      monitor_gym: null
      settings: null
  callbacks:
  - class_path: src.callbacks.model_checkpoint.CheckpointHook
    init_args:
      dirpath: null
      filename: null
      monitor: null
      verbose: false
      save_last: true
      save_top_k: -1
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      every_n_train_steps: 20
      train_time_interval: null
      every_n_epochs: null
      save_on_train_epoch_end: null
      enable_version_counter: true
  - class_path: src.callbacks.save_images.SaveImagesHook
    init_args:
      save_dir: val
      max_save_num: 100
      compressed: true
  - class_path: src.callbacks.save_grad_stats.SaveGradStatsHook
    init_args:
      save_dir: log_for_info
      log_interval: 100
      filename: loss_stats.txt
      plot_on_validation: true
      plot_every_val: true
      dpi: 180
  - class_path: src.callbacks.TF32.TF32Callback
    init_args:
      enabled: true
  fast_dev_run: false
  max_epochs: null
  min_epochs: null
  max_steps: 400365
  min_steps: null
  max_time: null
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  limit_predict_batches: null
  overfit_batches: 0.0
  val_check_interval: 50000
  check_val_every_n_epoch: null
  num_sanity_val_steps: 0
  log_every_n_steps: 10
  enable_checkpointing: null
  enable_progress_bar: null
  enable_model_summary: null
  accumulate_grad_batches: 1
  gradient_clip_val: null
  gradient_clip_algorithm: null
  deterministic: null
  benchmark: null
  inference_mode: true
  use_distributed_sampler: false
  profiler: null
  detect_anomaly: false
  barebones: false
  plugins:
  - class_path: src.plugins.bd_env.BDEnvironment
  sync_batchnorm: false
  reload_dataloaders_every_n_epochs: 0
  default_root_dir: universal_flow_workdirs
model:
  vae:
    class_path: src.models.vae.LatentVAE
    init_args:
      precompute: true
      weight_path: /data/lzw_25/DDT_revise/models
  conditioner:
    class_path: src.models.conditioner.LabelConditioner
    init_args:
      null_class: 1000
  denoiser:
    class_path: src.models.denoiser.decoupled_sit.DDT
    init_args:
      input_size: 32
      patch_size: 2
      in_channels: 4
      num_groups: 12
      hidden_size: 768
      num_blocks: 12
      num_encoder_blocks: 8
      learn_sigma: true
      deep_supervision: 0
      num_classes: 1000
      weight_path: null
      load_ema: false
      attn_begin: 1
      attn_end: 2
  diffusion_trainer:
    class_path: src.diffusion.stateful_flow_matching.training_repa.REPATrainer
    init_args:
      scheduler:
        class_path: src.diffusion.stateful_flow_matching.scheduling.LinearScheduler
      patch_size: 2
      loss_weight_fn: src.diffusion.stateful_flow_matching.training_repa.constant
      feat_loss_weight: 0.5
      attn_loss_weight: 0.5
      structual_loss_weight: 0.5
      lognorm_t: false
      encoder_weight_path: dinov2_vitb14
      align_layer:
      - 8
      dino_layer_timestep:
      - 9
      - 8
      - 7
      - 6
      dino_layer_block:
      - 11
      - 10
      - 9
      - 8
      encoder_anchor: 7
      decoder_anchor: 5
      proj_denoiser_dim: 768
      proj_hidden_dim: 2048
      proj_encoder_dim: 768
      encoder_depth: 11
      encoder_begin: 7
      encoder_end: 10
      log_interval: 100
      decoder_depth: 6
      encoder_depth_structual: 7
      proj_dim: 32
      inv_loss_weight: 0.49
      sigreg_loss_weight: 0.01
      cov_loss_weight: 0.02
      var_loss_weight: 0.5
      disp_loss_weight: 0.01
      vicreg_warmup_steps: 0
      vicreg_warmup_start_scale: 1.0
      null_condition_p: 0.1
      log_var: false
  diffusion_sampler:
    class_path: src.diffusion.stateful_flow_matching.sampling.EulerSampler
    init_args:
      w_scheduler:
        class_path: src.diffusion.stateful_flow_matching.scheduling.LinearScheduler
      timeshift: 1.0
      guidance_interval_min: 0.3
      guidance_interval_max: 1.0
      state_refresh_rate: 1
      step_fn: src.diffusion.stateful_flow_matching.sampling.ode_step_fn
      last_step: 0.04
      last_step_fn: src.diffusion.stateful_flow_matching.sampling.ode_step_fn
      scheduler:
        class_path: src.diffusion.stateful_flow_matching.scheduling.LinearScheduler
      guidance_fn: src.diffusion.base.guidance.simple_guidance_fn
      num_steps: 250
      guidance: 1.0
  ema_tracker:
    class_path: src.callbacks.simple_ema.SimpleEMA
    init_args:
      decay: 0.9999
      every_n_steps: 1
      eval_original_model: false
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 0.0001
      betas:
      - 0.9
      - 0.95
      eps: 1.0e-08
      weight_decay: 0.0
      amsgrad: false
      maximize: false
      foreach: null
      capturable: false
      differentiable: false
      fused: null
  lr_scheduler: null
  compile: false
data:
  train_root: /data/lzw_25/dataset/ImageNet/train
  test_nature_root: null
  test_gen_root: null
  train_image_size: 256
  train_batch_size: 42
  train_num_workers: 8
  var_transform_engine: null
  train_prefetch_factor: 2
  train_dataset: imagenet256
  eval_batch_size: 32
  eval_num_workers: 4
  eval_max_num_instances: 50000
  pred_batch_size: 32
  pred_num_workers: 4
  pred_seeds: null
  pred_selected_classes: null
  num_classes: 1000
  latent_shape:
  - 4
  - 32
  - 32
tags:
  exp: sigreg
ckpt_path: null
